<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Info</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      color: #222;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    h1 {
      color: #004aad;
      text-shadow: 1px 1px 3px #fff;
    }

    /* Floating Chat Button */
    #chat-toggle {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #007bff;
      border: none;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, background 0.3s ease;
      z-index: 999;
    }

    #chat-toggle:hover {
      background: #0056b3;
      transform: scale(1.1);
    }

    /* Centered Chat Window */
    #chat-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      height: 470px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
      z-index: 1000;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    #chat-header {
      background: #007bff;
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #close-chat {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    #chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .user {
      background: #d9edf7;
      align-self: flex-end;
      text-align: right;
    }

    .bot {
      background: #e8f5e9;
      align-self: flex-start;
    }

    .label {
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
    }

    #chat-input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    #chat-input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    #send-btn {
      background: #007bff;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      margin-left: 8px;
      cursor: pointer;
    }

    #send-btn:hover {
      background: #0056b3;
    }

    /* Optional dim background when chat is open */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      z-index: 998;
    }
  </style>
</head>
<body>
  <h1>🌤️ Weather Info</h1>
  <p>Click the chat icon below to check weather updates.</p>

  <!-- Dark overlay -->
  <div id="overlay"></div>

  <!-- Floating Chat Icon -->
  <button id="chat-toggle">💬</button>

  <!-- Chat Window (Centered) -->
  <div id="chat-container">
    <div id="chat-header">
      <span>Weather Chatbot</span>
      <button id="close-chat">✖</button>
    </div>
    <div id="chat-box"></div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="Ask: weather in Mumbai" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('chat-toggle');
    const closeBtn = document.getElementById('close-chat');
    const chatContainer = document.getElementById('chat-container');
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const overlay = document.getElementById('overlay');

    // Toggle chat window
    toggleBtn.addEventListener('click', () => {
      chatContainer.style.display = 'flex';
      overlay.style.display = 'block';
    });

    closeBtn.addEventListener('click', () => {
      chatContainer.style.display = 'none';
      overlay.style.display = 'none';
    });

    function appendMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);

      const label = document.createElement('span');
      label.classList.add('label');
      label.textContent = sender === 'user' ? 'You:' : 'Chatbot:';

      const content = document.createElement('span');
      content.textContent = text;

      msg.appendChild(label);
      msg.appendChild(content);

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      appendMessage(message, 'user');
      input.value = '';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        appendMessage(data.reply, 'bot');
      } catch {
        appendMessage('❌ Could not reach server', 'bot');
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
